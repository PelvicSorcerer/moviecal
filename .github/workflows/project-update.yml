name: project-update

# Slash-command workflow for updating GitHub Projects v2 fields from an issue comment.
# Usage: post a comment on an issue containing a line like
#   /project-update Status=Ready AgentDispatch=Yes
# The commenter must have write or admin repository access.
# This workflow requires the PROJECT_UPDATE_PAT secret (classic PAT, project scope).
#
# If the issue is not yet linked to the project, it will be added automatically
# before the field updates are applied.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write    # post reply comments via GITHUB_TOKEN
  contents: read   # checkout not needed but required by default permissions

jobs:
  update:
    runs-on: ubuntu-latest
    # Fast-exit: skip entirely when the comment cannot contain the command
    if: contains(github.event.comment.body, '/project-update')

    steps:
      - name: Run /project-update command
        env:
          # GITHUB_TOKEN is used for the collaborator-permission check and for
          # posting reply comments so they appear as github-actions[bot].
          # PROJECT_TOKEN is the PAT with project scope; used only for project
          # GraphQL queries and mutations — never printed to logs.
          ISSUES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_UPDATE_PAT }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -uo pipefail

          # The delivery project follows the repository owner. The GraphQL query
          # below supports both user and organization owners.
          PROJECT_OWNER="$REPO_OWNER"

          # ── Helper: post a reply comment via GITHUB_TOKEN ──────────────────────
          # Comments posted this way appear as "github-actions[bot]".
          post_reply() {
            printf '%s' "$1" \
              | jq -R -s '{"body": .}' \
              | GH_TOKEN="$ISSUES_TOKEN" gh api \
                  "repos/$REPO_OWNER/$REPO_NAME/issues/$ISSUE_NUMBER/comments" \
                  --silent --input - \
              || true
          }

          # ── 1. Find the /project-update command line ───────────────────────────
          update_line=$(printf '%s\n' "$COMMENT_BODY" \
            | grep -m1 '^[[:space:]]*/project-update' || true)

          if [ -z "$update_line" ]; then
            echo "No /project-update command line found."
            exit 0
          fi

          pairs_str=$(printf '%s' "$update_line" \
            | sed 's|^[[:space:]]*/project-update[[:space:]]*||')

          if [ -z "$pairs_str" ]; then
            post_reply $'**`/project-update` failed:** No `Key=Value` pairs provided.\n\nUsage: `` /project-update Status=Ready AgentDispatch=Yes ``'
            exit 0
          fi

          echo "Command: /project-update $pairs_str"

          # ── 2. Check commenter write/admin access via GITHUB_TOKEN ─────────────
          # 404 from the API means not a collaborator at all; treat as "none".
          perm=$(GH_TOKEN="$ISSUES_TOKEN" gh api \
            "repos/$REPO_OWNER/$REPO_NAME/collaborators/$COMMENTER/permission" \
            --jq '.permission' 2>/dev/null || echo "none")

          echo "Permission for @$COMMENTER: $perm"

          if [[ "$perm" != "write" && "$perm" != "admin" ]]; then
            post_reply $'> `/project-update` rejected: only repository collaborators with **write** or **admin** access may use this command.'
            exit 0
          fi

          # ── 3. Verify PAT is configured ────────────────────────────────────────
          if [ -z "$PROJECT_TOKEN" ]; then
            post_reply $'**`/project-update` failed:** The `PROJECT_UPDATE_PAT` secret is not configured. A repository admin must add it with `project` scope.'
            exit 1
          fi

          # ── 4. Parse Key=Value pairs ───────────────────────────────────────────
          # Supported fields: command-side key → project field name
          declare -A FIELD_MAP=(
            [Status]="Status"
            [AgentDispatch]="Agent Dispatch"
            [Track]="Track"
            [QueueOrder]="Queue Order"
            [Priority]="Priority"
            [Risk]="Risk"
            [ExecutionMode]="Execution Mode"
            [TargetPRSize]="Target PR Size"
          )

          declare -A PROJ_KEYS   # project_field_name → raw user value
          parse_errors=""

          read -ra pairs_arr <<< "$pairs_str"
          for pair in "${pairs_arr[@]}"; do
            if [[ "$pair" != *=* ]]; then
              parse_errors+="- \`$pair\` is not in \`Key=Value\` format.\n"
              continue
            fi
            key="${pair%%=*}"
            value="${pair#*=}"
            value="${value//_/ }"   # allow underscore as space substitute in option values

            if [[ -v FIELD_MAP[$key] ]]; then
              PROJ_KEYS["${FIELD_MAP[$key]}"]="$value"
            else
              known="Status, AgentDispatch, Track, QueueOrder, Priority, Risk, ExecutionMode, TargetPRSize"
              parse_errors+="- Unknown field \`$key\`. Valid fields: $known.\n"
            fi
          done

          if [ -n "$parse_errors" ]; then
            post_reply "$(printf '%b' "**\`/project-update\` failed — no changes made:**\n\n${parse_errors}")"
            exit 0
          fi

          if [ "${#PROJ_KEYS[@]}" -eq 0 ]; then
            post_reply $'**`/project-update` failed:** No recognized `Key=Value` pairs found.'
            exit 0
          fi

          # ── 5. Query project: ID and fields ───────────────────────────────────
          # Separate from item lookup so we can validate fields before fetching items.
          # All project API calls use PROJECT_TOKEN (project scope PAT).
          # Queries by title instead of a hardcoded number so the workflow
          # survives project recreation.
          PROJECT_TITLE="moviecal Delivery"
          echo "Querying projects for $PROJECT_OWNER..."

          projects_raw=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          query {
            organization(login: \"$PROJECT_OWNER\") {
              projectsV2(first: 20) {
                nodes {
                  id
                  title
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2Field {
                        id
                        name
                        dataType
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          }" 2>&1) || projects_raw=""

          if ! printf '%s' "$projects_raw" | jq -e '.data.organization.projectsV2.nodes | length > 0' >/dev/null 2>&1; then
            projects_raw=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          query {
            user(login: \"$PROJECT_OWNER\") {
              projectsV2(first: 20) {
                nodes {
                  id
                  title
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2Field {
                        id
                        name
                        dataType
                      }
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          }" 2>&1) || {
            safe_err=$(printf '%s' "$projects_raw" | head -c 300 | tr -dc '[:print:]\n')
            post_reply "**\`/project-update\` failed:** Could not query GitHub Projects. Verify that \`PROJECT_UPDATE_PAT\` is a classic PAT with \`project\` scope. API error: \`${safe_err}\`"
            exit 1
          }
          fi

          if [ -z "$projects_raw" ]; then
            post_reply "**\`/project-update\` failed:** Could not query GitHub Projects. Verify that \`PROJECT_UPDATE_PAT\` is a classic PAT with \`project\` scope."
            exit 1
          fi

          # Normalise: wrap the matching project node under .data.user.projectV2
          # so all subsequent jq paths are unchanged. Supports org- or user-owned projects.
          project_json=$(printf '%s' "$projects_raw" \
            | jq --arg t "$PROJECT_TITLE" \
              '{"data":{"user":{"projectV2":((.data.organization.projectsV2.nodes // .data.user.projectsV2.nodes) | map(select(.title == $t)) | .[0])}}}' \
            2>/dev/null) || {
            post_reply "**\`/project-update\` failed:** Could not parse the GitHub Projects API response."
            exit 1
          }

          gql_errs=$(printf '%s' "$projects_raw" \
            | jq -r '[.errors[]?.message] | select(length > 0) | join("; ")' 2>/dev/null || true)

          proj_id=$(printf '%s' "$project_json" \
            | jq -r '.data.user.projectV2.id // empty' 2>/dev/null || true)

          if [ -z "$proj_id" ]; then
            errmsg="Could not find a project named **${PROJECT_TITLE}** for \`$PROJECT_OWNER\`."
            [ -n "$gql_errs" ] && errmsg+=" GraphQL error: $gql_errs"
            post_reply "**\`/project-update\` failed:** $errmsg"
            exit 1
          fi

          # ── 6. Build field and option lookup tables ────────────────────────────
          declare -A F_IDS    # field_name → field_id
          declare -A F_TYPES  # field_name → "singleSelect" | "number" | "other"
          declare -A O_IDS    # "field_name@@lower_option_name" → option_id

          while IFS=$'\t' read -r fname fid ftype; do
            [ -z "$fname" ] && continue
            F_IDS["$fname"]="$fid"
            F_TYPES["$fname"]="$ftype"
          done < <(printf '%s' "$project_json" | jq -r '
            .data.user.projectV2.fields.nodes[] |
            if has("options") then
              "\(.name)\t\(.id)\tsingleSelect"
            elif (.dataType // "") == "NUMBER" then
              "\(.name)\t\(.id)\tnumber"
            else
              "\(.name)\t\(.id)\tother"
            end
          ' 2>/dev/null || true)

          while IFS=$'\t' read -r fname oname oid; do
            [ -z "$fname" ] && continue
            lower_oname=$(printf '%s' "$oname" | tr '[:upper:]' '[:lower:]')
            O_IDS["${fname}@@${lower_oname}"]="$oid"
          done < <(printf '%s' "$project_json" | jq -r '
            .data.user.projectV2.fields.nodes[] |
            if has("options") then
              . as $f | $f.options[] | "\($f.name)\t\(.name)\t\(.id)"
            else empty end
          ' 2>/dev/null || true)

          # ── 7. Validate ALL field names and values before any mutation ─────────
          # No project fields are written until every field/value pair passes.
          # Validation also happens before we add an unlinked issue to the project,
          # preventing malformed commands from creating unwanted project items.
          declare -A UPD_TYPE  # proj_field_name → "singleSelect" | "number"
          declare -A UPD_VAL   # proj_field_name → option_id or numeric string
          val_errors=""

          for proj_name in "${!PROJ_KEYS[@]}"; do
            value="${PROJ_KEYS[$proj_name]}"

            if ! [[ -v F_IDS[$proj_name] ]]; then
              val_errors+="- Field \`$proj_name\` not found in the project definition.\n"
              continue
            fi

            ftype="${F_TYPES[$proj_name]}"

            if [[ "$ftype" == "singleSelect" ]]; then
              lower_val=$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')
              okey="${proj_name}@@${lower_val}"
              if ! [[ -v O_IDS[$okey] ]]; then
                valid_opts=$(printf '%s' "$project_json" | jq -r \
                  --arg fn "$proj_name" \
                  '[.data.user.projectV2.fields.nodes[] | select(.name == $fn) | .options[]?.name] | join(", ")' \
                  2>/dev/null || true)
                val_errors+="- Invalid value \`$value\` for \`$proj_name\`. Valid options: $valid_opts.\n"
              else
                UPD_TYPE["$proj_name"]="singleSelect"
                UPD_VAL["$proj_name"]="${O_IDS[$okey]}"
              fi

            elif [[ "$ftype" == "number" ]]; then
              if ! [[ "$value" =~ ^-?[0-9]+(\.[0-9]+)?$ ]]; then
                val_errors+="- \`$proj_name\` requires a numeric value; got \`$value\`.\n"
              else
                UPD_TYPE["$proj_name"]="number"
                UPD_VAL["$proj_name"]="$value"
              fi

            else
              val_errors+="- Field \`$proj_name\` has type \`$ftype\` which is not supported by this command.\n"
            fi
          done

          if [ -n "$val_errors" ]; then
            post_reply "$(printf '%b' "**\`/project-update\` failed — no changes made:**\n\n${val_errors}")"
            exit 0
          fi

          # ── 8. Find the project item linked to this issue (with pagination) ────
          # Uses a cursor-based loop so issues beyond the first 100 project items
          # are not mistakenly treated as unlinked.
          item_id=""
          has_next_page="true"
          cursor=""

          while [[ "$has_next_page" == "true" && -z "$item_id" ]]; do
            if [ -z "$cursor" ]; then
              items_page=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          query {
            node(id: \"$proj_id\") {
              ... on ProjectV2 {
                items(first: 100) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    id
                    content {
                      ... on Issue { number }
                      ... on PullRequest { number }
                    }
                  }
                }
              }
            }
          }" 2>/dev/null) || {
                post_reply "**\`/project-update\` failed:** Could not query project items."
                exit 1
              }
            else
              items_page=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          query {
            node(id: \"$proj_id\") {
              ... on ProjectV2 {
                items(first: 100, after: \"$cursor\") {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    id
                    content {
                      ... on Issue { number }
                      ... on PullRequest { number }
                    }
                  }
                }
              }
            }
          }" 2>/dev/null) || {
                post_reply "**\`/project-update\` failed:** Could not query project items (pagination)."
                exit 1
              }
            fi

            item_id=$(printf '%s' "$items_page" \
              | jq -r --argjson n "$ISSUE_NUMBER" \
                '[.data.node.items.nodes[] | select(.content.number == $n)] | .[0].id // empty' \
              2>/dev/null || true)

            has_next_page=$(printf '%s' "$items_page" \
              | jq -r '.data.node.items.pageInfo.hasNextPage // false' 2>/dev/null || echo "false")
            cursor=$(printf '%s' "$items_page" \
              | jq -r '.data.node.items.pageInfo.endCursor // empty' 2>/dev/null || true)
          done

          # ── 9. If not linked, look up the issue node ID and add it ────────────
          issue_was_added="false"
          if [ -z "$item_id" ]; then
            echo "Issue #$ISSUE_NUMBER is not in the project; looking up its node ID..."

            issue_node_raw=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          query {
            repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") {
              issue(number: $ISSUE_NUMBER) {
                id
              }
            }
          }" 2>/dev/null) || {
              post_reply "**\`/project-update\` failed:** Could not look up node ID for issue #$ISSUE_NUMBER."
              exit 1
            }

            issue_node_id=$(printf '%s' "$issue_node_raw" \
              | jq -r '.data.repository.issue.id // empty' 2>/dev/null || true)

            if [ -z "$issue_node_id" ]; then
              post_reply "**\`/project-update\` failed:** Issue #$ISSUE_NUMBER not found in repository \`$REPO_OWNER/$REPO_NAME\`."
              exit 1
            fi

            echo "Adding issue #$ISSUE_NUMBER (node $issue_node_id) to project..."

            add_result=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          mutation {
            addProjectV2ItemById(input: {
              projectId: \"$proj_id\"
              contentId: \"$issue_node_id\"
            }) {
              item { id }
            }
          }" 2>/dev/null) || {
              post_reply "**\`/project-update\` failed:** Could not add issue #$ISSUE_NUMBER to **${PROJECT_TITLE}**. Field updates were not applied."
              exit 1
            }

            add_errs=$(printf '%s' "$add_result" \
              | jq -r '[.errors[]?.message] | select(length > 0) | join("; ")' 2>/dev/null || true)

            if [ -n "$add_errs" ]; then
              post_reply "**\`/project-update\` failed:** Could not add issue #$ISSUE_NUMBER to **${PROJECT_TITLE}**: $add_errs. Field updates were not applied."
              exit 1
            fi

            item_id=$(printf '%s' "$add_result" \
              | jq -r '.data.addProjectV2ItemById.item.id // empty' 2>/dev/null || true)

            if [ -z "$item_id" ]; then
              post_reply "**\`/project-update\` failed:** Add mutation returned no item ID for issue #$ISSUE_NUMBER."
              exit 1
            fi

            issue_was_added="true"
            echo "Issue #$ISSUE_NUMBER added to project; item ID: $item_id"
          fi

          echo "Project ID: $proj_id"
          echo "Item ID:    $item_id"

          # ── 10. Apply mutations (all validation passed) ────────────────────────
          echo "Applying ${#UPD_TYPE[@]} field update(s)..."
          confirm_lines=""

          for proj_name in "${!UPD_TYPE[@]}"; do
            upd_type="${UPD_TYPE[$proj_name]}"
            upd_val="${UPD_VAL[$proj_name]}"
            fid="${F_IDS[$proj_name]}"
            display_val="${PROJ_KEYS[$proj_name]}"

            if [[ "$upd_type" == "singleSelect" ]]; then
              mut_result=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: \"$proj_id\"
              itemId: \"$item_id\"
              fieldId: \"$fid\"
              value: { singleSelectOptionId: \"$upd_val\" }
            }) {
              projectV2Item { id }
            }
          }" 2>/dev/null) || {
                added_note=""
                [[ "$issue_was_added" == "true" ]] && added_note=$'\n\n⚠️ Issue #'"$ISSUE_NUMBER"' was added to **'"${PROJECT_TITLE}"'** but the field update failed — check the project for current state.'
                post_reply "$(printf '%b' "**\`/project-update\` mutation error** on \`$proj_name\`.${added_note}")"
                exit 1
              }
            else
              mut_result=$(GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query="
          mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: \"$proj_id\"
              itemId: \"$item_id\"
              fieldId: \"$fid\"
              value: { number: $upd_val }
            }) {
              projectV2Item { id }
            }
          }" 2>/dev/null) || {
                added_note=""
                [[ "$issue_was_added" == "true" ]] && added_note=$'\n\n⚠️ Issue #'"$ISSUE_NUMBER"' was added to **'"${PROJECT_TITLE}"'** but the field update failed — check the project for current state.'
                post_reply "$(printf '%b' "**\`/project-update\` mutation error** on \`$proj_name\`.${added_note}")"
                exit 1
              }
            fi

            mut_errs=$(printf '%s' "$mut_result" \
              | jq -r '[.errors[]?.message] | select(length > 0) | join("; ")' 2>/dev/null) \
              || mut_errs="could not parse mutation response"

            if [ -n "$mut_errs" ]; then
              added_note=""
              [[ "$issue_was_added" == "true" ]] && added_note=$'\n\n⚠️ Issue #'"$ISSUE_NUMBER"' was added to **'"${PROJECT_TITLE}"'** but the field update failed — check the project for current state.'
              post_reply "$(printf '%b' "**\`/project-update\` failed** on \`$proj_name\`: $mut_errs.${added_note}")"
              exit 1
            fi

            confirm_lines+="- **${proj_name}** → \`${display_val}\`\n"
            echo "  Updated: $proj_name = $display_val"
          done

          # ── 11. Post success confirmation ──────────────────────────────────────
          if [[ "$issue_was_added" == "true" ]]; then
            post_reply "$(printf '%b' "**\`/project-update\` succeeded.**\n\nAdded issue #$ISSUE_NUMBER to **${PROJECT_TITLE}**.\nUpdated:\n${confirm_lines}")"
          else
            post_reply "$(printf '%b' "**\`/project-update\` applied** to #$ISSUE_NUMBER:\n\n${confirm_lines}")"
          fi
          echo "Done."
