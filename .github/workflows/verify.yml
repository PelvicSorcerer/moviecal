name: verify

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  lane-baseline:
    name: lane-baseline
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node --version && npm --version
      - name: branch/CI convention drift check
        run: npm run check:branch-ci
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: lane:baseline (lint)
        run: npm run lint
      - name: lane:baseline (typecheck)
        run: npm run typecheck
      - name: lane:baseline (build)
        run: npm run build

  lane-unit:
    name: lane-unit
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: lane:unit
        run: npm run lane:unit

  lane-integration:
    name: lane-integration
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: lane:integration
        run: npm run lane:integration
