name: verify

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: |
          node --version && npm --version
      - run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - run: npm run verify
        env:
          CI: true
