name: supabase-verify

on:
  push:
    branches:
      - master
      - agent/**
      - copilot/**
      - cursor/**
      - claude/**
    paths:
      - 'supabase/**'
      - 'scripts/supabase-db-lint.sh'
      - 'scripts/ci-full-stack-runtime.mjs'
      - '.github/workflows/supabase-verify.yml'
      - 'playwright.full-stack.config.ts'
      - 'e2e/full-stack-runtime.spec.ts'
      - 'src/app/auth/sign-in/route.ts'
      - 'src/app/settings/calendar/**'
      - 'src/app/watchlist/**'
      - 'src/app/api/calendar/**'
      - 'src/app/api/watchlist/**'
      - 'src/lib/auth/**'
      - 'src/lib/calendar-feed.ts'
      - 'src/lib/calendar-tokens.ts'
      - 'src/lib/supabase/**'
      - 'src/lib/test-stability/**'
      - 'src/lib/watchlist.ts'
      - 'src/lib/supabase/database.ts'
      - 'package.json'
      - 'test/supabase-schema.test.ts'
      - 'test/watchlist.real-stack.test.ts'
      - 'vitest.real-stack.config.ts'
  pull_request:
    paths:
      - 'supabase/**'
      - 'scripts/supabase-db-lint.sh'
      - 'scripts/ci-full-stack-runtime.mjs'
      - '.github/workflows/supabase-verify.yml'
      - 'playwright.full-stack.config.ts'
      - 'e2e/full-stack-runtime.spec.ts'
      - 'src/app/auth/sign-in/route.ts'
      - 'src/app/settings/calendar/**'
      - 'src/app/watchlist/**'
      - 'src/app/api/calendar/**'
      - 'src/app/api/watchlist/**'
      - 'src/lib/auth/**'
      - 'src/lib/calendar-feed.ts'
      - 'src/lib/calendar-tokens.ts'
      - 'src/lib/supabase/**'
      - 'src/lib/test-stability/**'
      - 'src/lib/watchlist.ts'
      - 'src/lib/supabase/database.ts'
      - 'package.json'
      - 'test/supabase-schema.test.ts'
      - 'test/watchlist.real-stack.test.ts'
      - 'vitest.real-stack.config.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lane-real-stack:
    name: lane-real-stack
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: supabase/setup-cli@v2
        with:
          version: '2.106.0'

      - run: node --version && npm --version && supabase --version

      - run: npm ci --no-audit --no-fund

      - name: Start local Supabase stack
        run: supabase start

      - name: Export local Supabase credentials for real-stack tests
        run: |
          STATUS_JSON=$(supabase status --output json)
          ANON_KEY=$(echo "$STATUS_JSON" | jq -r '(.ANON_KEY // .anon_key)')
          SERVICE_ROLE_KEY=$(echo "$STATUS_JSON" | jq -r '(.SERVICE_ROLE_KEY // .service_role_key)')
          API_URL=$(echo "$STATUS_JSON" | jq -r '(.API_URL // .api_url // "http://127.0.0.1:54321")')
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$API_URL" >> "$GITHUB_ENV"
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$ANON_KEY" >> "$GITHUB_ENV"
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: lane:real-stack
        run: npm run lane:real-stack

  lane-full-stack-runtime:
    name: lane-full-stack-runtime
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: node --version && npm --version

      - uses: supabase/setup-cli@v2
        with:
          version: '2.106.0'

      - run: npm ci --no-audit --no-fund

      - name: Apply migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: lane:full-stack
        run: npm run lane:full-stack

  lane-migrate-prod:
    name: lane-migrate-prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: '2.106.0'

      - name: Apply migrations to production
        run: supabase db push --db-url "$SUPABASE_DB_URL_PROD"
        env:
          SUPABASE_DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}
