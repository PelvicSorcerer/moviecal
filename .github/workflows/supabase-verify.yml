name: supabase-verify

on:
  push:
    branches:
      - master
      - agent/**
      - copilot/**
      - cursor/**
      - claude/**
    paths:
      - 'supabase/**'
      - 'scripts/supabase-db-lint.sh'
      - '.github/workflows/supabase-verify.yml'
      - 'src/lib/supabase/database.ts'
      - 'test/supabase-schema.test.ts'
  pull_request:
    paths:
      - 'supabase/**'
      - 'scripts/supabase-db-lint.sh'
      - '.github/workflows/supabase-verify.yml'
      - 'src/lib/supabase/database.ts'
      - 'test/supabase-schema.test.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lane-real-stack:
    name: lane-real-stack
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: supabase/setup-cli@v2
        with:
          version: '2.106.0'

      - run: node --version && npm --version && supabase --version

      - run: npm ci --no-audit --no-fund

      - name: Start local Supabase stack
        run: supabase start

      - name: lane:real-stack
        run: npm run lane:real-stack
