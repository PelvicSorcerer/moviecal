name: project-queue-check

on:
  push:
    branches:
      - master
      - agent/**
      - orchestrator/**
      - copilot/**
      - cursor/**
      - claude/**
      - docs/**
      - chore/**
    paths:
      - 'scripts/project-queue-check.sh'
      - 'scripts/agent-check.sh'
      - 'scripts/agent-handoff-check.sh'
      - 'scripts/lib/project-queue-common.sh'
      - 'scripts/project-platform-track-sync.sh'
      - 'scripts/export-open-issue-order.sh'
      - '.github/workflows/project-queue-check.yml'
      - 'docs/operators/branch-and-ci-conventions.md'
      - 'docs/operators/branch-prefixes.json'
      - 'docs/operators/multi-platform-dispatch-policy.md'
      - 'docs/planning/project-field-taxonomy.md'
      - 'docs/planning/github-project-migration-plan.md'
      - 'AGENTS.md'
      - 'package.json'
  pull_request:
    paths:
      - 'scripts/project-queue-check.sh'
      - 'scripts/agent-check.sh'
      - 'scripts/agent-handoff-check.sh'
      - 'scripts/lib/project-queue-common.sh'
      - 'scripts/project-platform-track-sync.sh'
      - 'scripts/export-open-issue-order.sh'
      - '.github/workflows/project-queue-check.yml'
      - 'docs/operators/multi-platform-dispatch-policy.md'
      - 'docs/planning/project-field-taxonomy.md'
      - 'docs/planning/github-project-migration-plan.md'
      - 'AGENTS.md'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  project-queue-check:
    runs-on: ubuntu-latest
    env:
      # PROJECT_UPDATE_PAT already needs project+repo scopes for /project-update,
      # so it is also a safe fallback for the read-only live queue check.
      GH_TOKEN: ${{ secrets.PROJECT_QUEUE_TOKEN || secrets.PROJECT_UPDATE_PAT }}
      PROJECT_QUEUE_MODE: post-cutover
      PROJECT_QUEUE_REPO: PelvicSorcerer/moviecal
      PROJECT_QUEUE_OWNER: PelvicSorcerer
      PROJECT_QUEUE_NUMBER: 2
    steps:
      - uses: actions/checkout@v4
      - name: Note missing project queue credentials
        if: ${{ env.GH_TOKEN == '' }}
        run: |
          echo "Neither PROJECT_QUEUE_TOKEN nor PROJECT_UPDATE_PAT is configured for this repository."
          echo "Skipping live GitHub Project validation and continuing with fixture coverage."
          echo "Configure either repository secret with token scopes that can read both Projects and repository issues to enable the live check."
          echo "Minimum expected scopes today: project and read:project, plus repository issue-read access compatible with gh issue list."
      - name: Show tool versions
        run: gh --version && jq --version
      - name: Validate live GitHub Project queue state
        if: ${{ env.GH_TOKEN != '' }}
        run: bash scripts/project-queue-check.sh
      - name: Validate fixture-based post-cutover happy path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Shared Watchlists",
                "title":"Dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":74}
              },
              {
                "agent Dispatch":"No",
                "status":"Backlog",
                "track":"Shared Watchlists",
                "title":"Non-dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":91}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":74,"title":"Dispatch issue"},
              {"number":91,"title":"Non-dispatch issue"}
            ]
        run: bash scripts/project-queue-check.sh
      - name: Validate fixture-based blocked queue path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"No",
                "status":"Backlog",
                "track":"Shared Watchlists",
                "title":"Blocked queue issue",
                "labels":[],
                "content":{"type":"Issue","number":95}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":95,"title":"Blocked queue issue"}
            ]
        run: bash scripts/project-queue-check.sh
      - name: Validate fixture-based post-cutover failure path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Backlog",
                "track":"Shared Watchlists",
                "title":"Dispatch issue with wrong status",
                "labels":[],
                "content":{"type":"Issue","number":74}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":74,"title":"Dispatch issue with wrong status"}
            ]
        run: |
          set +e
          bash scripts/project-queue-check.sh
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected post-cutover failure fixture to fail, but it passed." >&2
            exit 1
          fi
      - name: Validate fixture-based agent-check happy path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Shared Watchlists",
                "title":"Dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":74}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {
                "number":74,
                "title":"Dispatch issue",
                "body":"Relevant docs:\n- AGENTS.md\n\nAcceptance criteria:\n- Do the thing\n\nVerification:\n- npm run verify"
              }
            ]
        run: bash scripts/agent-check.sh
      - name: Validate fixture-based agent-check failure path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Backlog",
                "track":"Shared Watchlists",
                "title":"Dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":74}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {
                "number":74,
                "title":"Dispatch issue",
                "body":"Relevant docs:\n- AGENTS.md\n\nAcceptance criteria:\n- Do the thing\n\nVerification:\n- npm run verify"
              }
            ]
        run: |
          set +e
          bash scripts/agent-check.sh
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected agent-check failure fixture to fail, but it passed." >&2
            exit 1
          fi
      - name: Validate fixture-based Future track dispatch path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Future",
                "title":"Future dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":123}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":123,"title":"Future dispatch issue"}
            ]
        run: bash scripts/project-queue-check.sh
      - name: Validate fixture-based Calendar track dispatch path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Calendar",
                "title":"Calendar dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":223}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":223,"title":"Calendar dispatch issue"}
            ]
        run: bash scripts/project-queue-check.sh
      - name: Validate fixture-based Product shorthand dispatch failure path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Product",
                "title":"Invalid Product shorthand dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":222}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":222,"title":"Invalid Product shorthand dispatch issue"}
            ]
        run: |
          set +e
          bash scripts/project-queue-check.sh
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected Product shorthand dispatch fixture to fail, but it passed." >&2
            exit 1
          fi
      - name: Validate fixture-based Platform track dispatch failure path
        env:
          PROJECT_QUEUE_MODE: post-cutover
          PROJECT_QUEUE_ITEMS_JSON: |
            {"items":[
              {
                "agent Dispatch":"Yes",
                "status":"Ready",
                "track":"Platform",
                "title":"Invalid platform dispatch issue",
                "labels":[],
                "content":{"type":"Issue","number":147}
              }
            ]}
          PROJECT_QUEUE_OPEN_ISSUES_JSON: |
            [
              {"number":147,"title":"Invalid platform dispatch issue"}
            ]
        run: |
          set +e
          bash scripts/project-queue-check.sh
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected Platform track dispatch fixture to fail, but it passed." >&2
            exit 1
          fi
